<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Brevário Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'marfin': '#FDFBF7',
                        'azul-mariano': '#1E3A8A',
                        'azul-escuro': '#2D3748',
                        'branco': '#ffffff'
                    },
                    fontFamily: {
                        serifa: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #d1dfee; color: #000000; }
        .hero-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="font-sans">
    <section class="relative h-screen w-full flex items-center justify-center overflow-hidden">
    <img src="/image/cruz.jpg" alt="cristo crucuficado" class="absolute inset-0 w-full h-full object-cover">
    <div class="absolute inset-0 bg-branco/60 z-10"></div>
    <div class="relative z-20 text-center px-4 max-w-4xl">
        <h1 class="hero-title text-5xl md:text-7xl text-marfim mb-6 leading-tight italic">
            "A arte, a fé e a oração reunidos em um só lugar."
        </h1>
        <p class="text-marfim/90 text-lg md:text-xl font-light tracking-wide mb-10 uppercase">
            Vocação • Rotina • Comunidade
        </p>
        
        <a href="#seminario" class="inline-block border border-azul-escuro text-azul-escuro px-8 py-3 hover:bg-azul-escuro hover:text-marfim transition-all duration-500 ease-in-out font-serifa italic">
            Explorar Jornada
        </a>
    </div>
</section>
</body>
</html>
